name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0
  workflow_dispatch: # Allows manual triggering

jobs:
  release:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        # We use Mac, Windows, and Linux runners
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Frontend & Root Dependencies
        run: |
          npm install
          cd frontend && npm install && npm run build
          cd ..

      - name: Build Python Sidecar
        shell: bash
        run: |
          cd backend
          python -m venv venv
          # Use specific shell activate commands based on OS
          if [ "$RUNNER_OS" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          # Build the engine
          python -m PyInstaller --noconfirm --onefile --windowed --name "engine" api.py
          cd ..

      - name: Build & Publish Electron App
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Set to true to actually create the GitHub Release
          release: ${{ startsWith(github.ref, 'refs/tags/') }}
          # Determine the build command based on OS
          args: |
            ${{ matrix.os == 'macos-latest' && '--mac --universal' || '' }}
            ${{ matrix.os == 'windows-latest' && '--win --x64' || '' }}
            ${{ matrix.os == 'ubuntu-latest' && '--linux --AppImage' || '' }}
          
      - name: Create Custom Release Notes
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'macos-latest'
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 📖 Universal Novel Scraper ${{ github.ref_name }}
            
            Download the version specific to your operating system below.
            
            ### 💻 Installation Instructions
            
            #### 🍎 macOS
            1. Download the `.dmg` (Universal) file.
            2. Drag **UNS** to your Applications folder.
            3. **Note:** On first launch, if you see a developer warning, Right-Click the app and select **Open**.
            
            #### 🪟 Windows
            1. Download the `.exe` installer.
            2. Run the installer and follow the prompts.
            
            #### 🐧 Linux
            1. Download the `.AppImage`.
            2. Make it executable: `chmod +x UNS-*.AppImage`.
            3. Run the file.
            
            ---
            *Built with ❤️ using Electron + Python Sidecar Architecture.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}